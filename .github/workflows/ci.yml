name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check workspace
        run: cargo check --workspace

      - name: Test poker-table contract
        run: cargo test -p poker-table

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  circuits:
    name: Noir circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Nargo toolchain
        uses: actions/cache@v4
        with:
          path: |
            .tmp_tools
            .tmp_nargo_home
          key: ${{ runner.os }}-nargo-1.0.0-beta.17
          restore-keys: ${{ runner.os }}-nargo-

      - name: Compile all Noir circuits
        run: ./scripts/compile-circuits.sh

      - name: Install Nargo for tests
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/refs/heads/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          $HOME/.nargo/bin/noirup -v 1.0.0-beta.17

      - name: Run Noir library tests
        run: cd circuits/lib && nargo test

  e2e-hand-lifecycle:
    name: Full hand lifecycle e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2e-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-e2e-cargo-

      - name: Cache Nargo toolchain and CRS
        uses: actions/cache@v4
        with:
          path: |
            .tmp_tools
            .tmp_nargo_home
            crs
          key: ${{ runner.os }}-e2e-nargo-crs-1.0.0-beta.17
          restore-keys: ${{ runner.os }}-e2e-nargo-crs-

      # Cache co-noir binary to avoid recompiling from source on every run
      - name: Cache co-noir binary
        id: cache-co-noir
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/co-noir
          key: co-noir-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install co-noir
        if: steps.cache-co-noir.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/TaceoLabs/co-snarks --branch main co-noir
          co-noir --version

      - name: Compile circuits
        run: ./scripts/compile-circuits.sh

      - name: Download CRS
        run: ./scripts/download-crs.sh

      - name: Install Python flow dependencies
        run: python3 -m pip install requests pynacl

      - name: Start Soroban and MPC stack
        run: docker compose up -d --build soroban mpc-node-0 mpc-node-1 mpc-node-2 coordinator

      - name: Run full hand lifecycle flow
        run: python3 scripts/test-flow.py

      - name: Install schemathesis for conformance test
        run: pip install schemathesis pyyaml

      - name: Live API conformance against coordinator
        env:
          COORDINATOR_URL: http://localhost:8080
        run: python3 scripts/check-api-spec.py

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down --remove-orphans

  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Lint
        run: cd app && npm run lint

      - name: Build
        run: cd app && npm run build
        env:
          NEXT_PUBLIC_COORDINATOR_URL: http://localhost:8080
